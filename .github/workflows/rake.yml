# Formerly cimas-managed. Now consumer-owned per metanorma/cimas#68 (workflow-file
# conversion from cimas-synced copied stubs to reusable-workflow references).
# References metanorma/ci reusable at @v1 (immutable via @v1.0.0, moving via @v1).
name: rake

on:
  push:
    branches: [ master, main ]
    tags: [ v* ]
  pull_request:

permissions:
  contents: write

jobs:
  rake:
    uses: metanorma/ci/.github/workflows/generic-rake.yml@v1
    secrets:
      pat_token: ${{ secrets.METANORMA_CI_PAT_TOKEN }}
